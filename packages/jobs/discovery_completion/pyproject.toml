[project]
name = "discovery-completion"
version = "0.1.0"
description = "Emits processing manifests once a discovery run's spot scrapes are complete"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aws-lambda-powertools>=3.23.0",
    "boto3>=1.42.15",
]

[build-system]
requires = ["uv_build>=0.9.14,<0.10.0"]
build-backend = "uv_build"
