[project]
name = "catalog-builder"
version = "0.1.0"
description = "Rebuilds processed/discovery/catalog_latest from append-only discovery tables"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aws-lambda-powertools>=3.23.0",
    "boto3>=1.42.15",
    "pyarrow>=23.0.0",
]

[build-system]
requires = ["uv_build>=0.9.14,<0.10.0"]
build-backend = "uv_build"
