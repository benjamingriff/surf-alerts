[project]
name = "forecast-spot-processor"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "boto3>=1.35.0",
    "forecast-control",
    "forecast-transform",
    "postgres-client",
]

[tool.uv.sources]
forecast-control = { workspace = true }
forecast-transform = { workspace = true }
postgres-client = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
