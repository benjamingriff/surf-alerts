[project]
name = "discovery-spot-history-processor"
version = "0.1.0"
description = "Processes one discovery spot history chunk into processed parquet outputs"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aws-lambda-powertools>=3.23.0",
    "boto3>=1.42.15",
    "pyarrow>=21.0.0",
]

[build-system]
requires = ["uv_build>=0.9.14,<0.10.0"]
build-backend = "uv_build"
